version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slabai_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - slabai_network

  frontend:
    build:
      context: ./src/slabai
      dockerfile: Dockerfile
    container_name: slabai_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./src/slabai/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - slabai_network

networks:
  slabai_network:
    driver: bridge
